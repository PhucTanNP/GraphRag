name: GraphRAG CI/CD

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Deploy to EC2 (true/false)'
        required: false
        default: 'false'
      run_stress:
        description: 'Run stress tests (true/false)'
        required: false
        default: 'false'
      debug_enabled:
        description: 'Enable tmate debug session'
        required: false
        default: 'false'

env:
  PYTHONPATH: .
  RUN_STRESS: '0'
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME || 'drcshop' }}/graphrag

jobs:
  # ============================================================
  # 1. UNIT TESTS + LINT
  # ============================================================
  unit-tests:
    name: Unit Tests (Py ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint with Ruff
        run: |
          ruff check app/ tests/ --output-format=github || echo "Lint warnings found"

      - name: Run unit tests
        run: |
          pytest tests -q --ignore=tests/test_stress_conversation.py \
            --ignore=tests/test_tracing_init.py \
            -x --timeout=30

  # ============================================================
  # 2. DOCKER BUILD & PUSH
  # ============================================================
  docker:
    name: Docker Build & Push
    needs: unit-tests
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Generate tags
        id: meta
        run: |
          echo "tags=${{ env.DOCKER_IMAGE }}:latest,${{ env.DOCKER_IMAGE }}:${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # 3. DEPLOY TO EC2
  # ============================================================
  deploy:
    name: Deploy to EC2
    needs: docker
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'))
      || (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy == 'true')

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            echo "🚀 Pulling GraphRAG image..."
            docker pull ${{ env.DOCKER_IMAGE }}:latest

            echo "🔄 Restarting GraphRAG service..."
            cd /app/graphrag
            docker compose up -d --force-recreate graphrag-api

            echo "🧹 Cleaning up old images..."
            docker image prune -f

            echo "✅ GraphRAG deployed successfully!"

  # ============================================================
  # 4. STRESS TESTS (manual only)
  # ============================================================
  stress-tests:
    name: Stress Tests
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_stress == 'true' }}
    runs-on: ubuntu-latest
    services:
      neo4j:
        image: neo4j:5
        options: >-
          --health-cmd="curl -f http://localhost:7474 || exit 1"
          --health-interval=10s --health-timeout=5s --health-retries=10
        ports:
          - 7474:7474
          - 7687:7687
        env:
          NEO4J_AUTH: neo4j/password
      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install
        run: uv sync --dev

      - name: Wait for Neo4j
        run: python app/backup/wait_for_neo4j.py

      - name: Run stress tests
        env:
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: password
          RUN_STRESS: '1'
          STRESS_TURNS: '10'
        run: |
          python -m pytest tests/test_stress_conversation.py -q -x --timeout=300

  # ============================================================
  # 5. SECURITY SCAN
  # ============================================================
  security-scan:
    name: Security Audit
    needs: unit-tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit

      - name: Scan dependencies
        run: |
          python -m pip_audit . || echo "Vulnerabilities found (non-blocking)"

  # ============================================================
  # 6. DEBUG (tmate, manual only)
  # ============================================================
  debug:
    name: Debug via tmate
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.debug_enabled == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install deps
        run: uv sync --dev

      - name: Start tmate session
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: true
